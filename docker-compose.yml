services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: condominios4-app
    container_name: condominios4-app
    ports:
      - "8001:8000"
    volumes:
      - .:/var/www/html:cached
      - vendor_data:/var/www/html/vendor
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_PORT: ${DB_PORT}
      APP_URL: ${APP_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      LOGO_FILESYSTEM_DISK: ${FILESYSTEM_DISK}
      LOGO_FILESYSTEM_URL: ${LOGO_FILESYSTEM_URL}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_INTERNAL_URL: ${AWS_INTERNAL_URL}
      AWS_URL: ${AWS_URL}
    working_dir: /var/www/html
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    depends_on:
      redis:
        condition: service_healthy

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: condominios4-app
    container_name: condominios4-queue-worker
    restart: unless-stopped
    volumes:
      - .:/var/www/html:cached
      - vendor_data:/var/www/html/vendor
    env_file:
      - .env
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--backoff=5", "--timeout=90"]
    stop_grace_period: 2m
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: condominios4-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vendor_data:
    driver: local
  redis_data:
    driver: local
